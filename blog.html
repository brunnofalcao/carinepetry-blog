<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Dra. Carine Petry</title>
    <meta name="description" content="Artigos sobre Medicina do Sono, SAM, SED e Covid Longa por Dra. Carine Petry">
    <style>
        /* Importando Fontes Brandbook */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Cores Brandbook Oficial */
            --borgonha-profundo: #4A1942;
            --magenta-vibrante: #9D174D;
            --creme-luminoso: #FFF9FB;
            --cinza-neutro: #4A4A4A;
            --branco: #FFFFFF;
            
            /* Typography Brandbook */
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
        }
        
        body {
            font-family: var(--font-body);
            background-color: var(--creme-luminoso);
            color: var(--cinza-neutro);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        /* HEADER */
        .header {
            background: var(--branco);
            border-bottom: 1px solid rgba(93, 43, 61, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--borgonha-profundo);
            text-decoration: none;
        }
        
        .nav {
            display: flex;
            gap: 2rem;
        }
        
        .nav a {
            color: var(--cinza-neutro);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav a:hover,
        .nav a.active {
            color: var(--borgonha-profundo);
        }
        
        /* HERO BLOG */
        .blog-hero {
            background: linear-gradient(135deg, var(--borgonha-profundo) 0%, #3A1234 100%);
            color: var(--branco);
            padding: 4rem 2rem;
            text-align: center;
        }
        
        .blog-hero-title {
            font-size: 3rem;
            font-family: var(--font-display);
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .blog-hero-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* BLOG CONTAINER */
        .blog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        /* POST DESTAQUE */
        .featured-section {
            margin-bottom: 4rem;
        }
        
        .section-label {
            display: inline-block;
            color: var(--magenta-vibrante);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        
        .featured-post {
            background: var(--branco);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(74, 25, 66, 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        
        .featured-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 400px;
        }
        
        .featured-content {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .post-category {
            display: inline-block;
            background: rgba(157, 23, 77, 0.1);
            color: var(--magenta-vibrante);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .featured-title {
            font-size: 2.2rem;
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--borgonha-profundo);
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        
        .post-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--cinza-neutro);
            opacity: 0.7;
        }
        
        .post-excerpt {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2rem;
            color: var(--cinza-neutro);
        }
        
        .btn-read {
            background: var(--borgonha-profundo);
            color: var(--branco);
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-read:hover {
            background: #3A1234;
            transform: translateY(-2px);
        }
        
        /* GRID DE POSTS */
        .posts-section {
            margin-bottom: 4rem;
        }
        
        .section-title {
            font-size: 2rem;
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--borgonha-profundo);
            margin-bottom: 2rem;
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        
        .post-card {
            background: var(--branco);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(74, 25, 66, 0.08);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(74, 25, 66, 0.15);
        }
        
        .post-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .post-card-content {
            padding: 1.5rem;
        }
        
        .post-card-title {
            font-size: 1.3rem;
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--borgonha-profundo);
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        
        .post-card-excerpt {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--cinza-neutro);
            margin-bottom: 1rem;
        }
        
        .post-card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--cinza-neutro);
            opacity: 0.6;
        }
        
        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--branco);
            border-radius: 12px;
            margin: 2rem 0;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .empty-state-title {
            font-size: 1.5rem;
            font-family: var(--font-display);
            color: var(--borgonha-profundo);
            margin-bottom: 0.5rem;
        }
        
        .empty-state-text {
            color: var(--cinza-neutro);
            opacity: 0.7;
        }
        
        /* FOOTER */
        .footer {
            background: var(--borgonha-profundo);
            color: var(--branco);
            padding: 3rem 2rem 1.5rem;
        }
        
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        
        .footer-bottom {
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav {
                display: none;
            }
            
            .blog-hero-title {
                font-size: 2rem;
            }
            
            .featured-post {
                grid-template-columns: 1fr;
            }
            
            .featured-image {
                min-height: 250px;
            }
            
            .posts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">Dra. Carine Petry</a>
            <nav class="nav">
                <a href="index.html#sobre">Sobre</a>
                <a href="index.html#areas">Áreas de Atuação</a>
                <a href="index.html#como-funciona">Como Funciona</a>
                <a href="blog.html" class="active">Blog</a>
                <a href="index.html#contato">Contato</a>
            </nav>
        </div>
    </header>

    <!-- HERO -->
    <section class="blog-hero">
        <h1 class="blog-hero-title">Blog</h1>
        <p class="blog-hero-subtitle">Artigos sobre Medicina do Sono, diagnósticos complexos e saúde investigativa</p>
    </section>

    <!-- BLOG CONTAINER -->
    <div class="blog-container">
        <!-- POST EM DESTAQUE -->
        <section class="featured-section">
            <span class="section-label">Post em Destaque</span>
            <div id="featuredPost">
                <!-- Será preenchido dinamicamente pelo JavaScript -->
            </div>
        </section>

        <!-- POSTS RECENTES -->
        <section class="posts-section">
            <h2 class="section-title">Artigos Recentes</h2>
            <div id="postsGrid" class="posts-grid">
                <!-- Será preenchido dinamicamente pelo JavaScript -->
            </div>
        </section>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-container">
            <p><strong>Dra. Carine Petry</strong> • Medicina do Sono • CRM-DF 15342</p>
            <div class="footer-bottom">
                <p>&copy; 2026 Dra. Carine Petry. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        // SISTEMA DINÂMICO DE BLOG
        
        // Função para carregar posts do localStorage
        function loadPosts() {
            const postsJson = localStorage.getItem('blog_posts');
            if (!postsJson) {
                return [];
            }
            
            try {
                const posts = JSON.parse(postsJson);
                return Array.isArray(posts) ? posts : [];
            } catch (e) {
                console.error('Erro ao carregar posts:', e);
                return [];
            }
        }
        
        // Função para formatar data
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
        }
        
        // Função para calcular tempo de leitura
        function calcularTempoLeitura(conteudo) {
            const palavras = conteudo.split(/\s+/).length;
            const minutos = Math.ceil(palavras / 200);
            return `${minutos} min de leitura`;
        }
        
        // Renderizar post em destaque
        function renderFeaturedPost(post) {
            const featuredContainer = document.getElementById('featuredPost');
            
            if (!post) {
                featuredContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3 class="empty-state-title">Nenhum post publicado ainda</h3>
                        <p class="empty-state-text">Em breve teremos conteúdo novo por aqui!</p>
                    </div>
                `;
                return;
            }
            
            featuredContainer.innerHTML = `
                <article class="featured-post">
                    <img src="${post.imagem || 'https://via.placeholder.com/600x400/4A1942/FFF9FB?text=Dra.+Carine+Petry'}" 
                         alt="${post.titulo}" 
                         class="featured-image">
                    <div class="featured-content">
                        <span class="post-category">${post.categoria || 'Medicina do Sono'}</span>
                        <h2 class="featured-title">${post.titulo}</h2>
                        <div class="post-meta">
                            <span>📅 ${formatDate(post.data)}</span>
                            <span>⏱ ${calcularTempoLeitura(post.conteudo)}</span>
                        </div>
                        <p class="post-excerpt">${post.resumo || post.conteudo.substring(0, 200) + '...'}</p>
                        <a href="artigo.html?id=${post.id}" class="btn-read">Ler Artigo Completo</a>
                    </div>
                </article>
            `;
        }
        
        // Renderizar grid de posts
        function renderPostsGrid(posts) {
            const postsGrid = document.getElementById('postsGrid');
            
            if (!posts || posts.length === 0) {
                postsGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">📚</div>
                        <h3 class="empty-state-title">Nenhum artigo disponível</h3>
                        <p class="empty-state-text">Novos artigos serão publicados em breve!</p>
                    </div>
                `;
                return;
            }
            
            postsGrid.innerHTML = posts.map(post => `
                <a href="artigo.html?id=${post.id}" class="post-card">
                    <img src="${post.imagem || 'https://via.placeholder.com/400x200/4A1942/FFF9FB?text=' + encodeURIComponent(post.titulo.substring(0, 20))}" 
                         alt="${post.titulo}" 
                         class="post-card-image">
                    <div class="post-card-content">
                        <span class="post-category">${post.categoria || 'Medicina do Sono'}</span>
                        <h3 class="post-card-title">${post.titulo}</h3>
                        <p class="post-card-excerpt">${post.resumo || post.conteudo.substring(0, 120) + '...'}</p>
                        <div class="post-card-meta">
                            <span>${formatDate(post.data)}</span>
                            <span>${calcularTempoLeitura(post.conteudo)}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }
        
        // Inicializar blog
        function initBlog() {
            const allPosts = loadPosts();
            
            // Filtrar apenas posts publicados
            const publishedPosts = allPosts.filter(post => post.status === 'publicado');
            
            // Ordenar por data (mais recente primeiro)
            publishedPosts.sort((a, b) => new Date(b.data) - new Date(a.data));
            
            // Post em destaque (mais recente)
            const featuredPost = publishedPosts[0];
            renderFeaturedPost(featuredPost);
            
            // Posts recentes (excluindo o destacado)
            const recentPosts = publishedPosts.slice(1);
            renderPostsGrid(recentPosts);
        }
        
        // Carregar ao iniciar página
        document.addEventListener('DOMContentLoaded', initBlog);
    </script>
</body>
</html>
