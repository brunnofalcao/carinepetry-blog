<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Artigo | Dra. Carine Petry</title>
    <meta name="description" content="Artigo sobre Medicina do Sono por Dra. Carine Petry">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --borgonha-profundo: #4A1942;
            --magenta-vibrante: #9D174D;
            --creme-luminoso: #FFF9FB;
            --cinza-neutro: #4A4A4A;
            --branco: #FFFFFF;
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
        }
        
        body {
            font-family: var(--font-body);
            background-color: var(--creme-luminoso);
            color: var(--cinza-neutro);
            line-height: 1.8;
        }
        
        .header {
            background: var(--branco);
            border-bottom: 1px solid rgba(74, 25, 66, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--borgonha-profundo);
            text-decoration: none;
        }
        
        .btn-voltar {
            color: var(--borgonha-profundo);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-voltar:hover {
            color: var(--magenta-vibrante);
        }
        
        .article-header {
            background: linear-gradient(135deg, var(--borgonha-profundo) 0%, #3A1234 100%);
            color: var(--branco);
            padding: 4rem 2rem;
        }
        
        .article-header-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .article-category {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        
        .article-title {
            font-size: 3rem;
            font-family: var(--font-display);
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }
        
        .article-meta {
            display: flex;
            gap: 2rem;
            font-size: 0.95rem;
            opacity: 0.9;
        }
        
        .article-image {
            width: 100%;
            max-width: 1200px;
            margin: -3rem auto 0;
            display: block;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(74, 25, 66, 0.2);
        }
        
        .article-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
        }
        
        .article-content {
            background: var(--branco);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(74, 25, 66, 0.08);
        }
        
        .article-content h2 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--borgonha-profundo);
            margin: 2rem 0 1rem;
        }
        
        .article-content h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--borgonha-profundo);
            margin: 1.5rem 0 1rem;
        }
        
        .article-content p {
            font-size: 1.1rem;
            line-height: 1.9;
            margin-bottom: 1.5rem;
        }
        
        .article-content ul,
        .article-content ol {
            margin: 1.5rem 0;
            padding-left: 2rem;
        }
        
        .article-content li {
            margin-bottom: 0.75rem;
            font-size: 1.05rem;
        }
        
        .article-content strong {
            color: var(--borgonha-profundo);
            font-weight: 600;
        }
        
        .article-content blockquote {
            border-left: 4px solid var(--magenta-vibrante);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--cinza-neutro);
            opacity: 0.9;
        }
        
        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 600px;
            margin: 4rem auto;
        }
        
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 2rem;
            font-family: var(--font-display);
            color: var(--borgonha-profundo);
            margin-bottom: 1rem;
        }
        
        .error-text {
            font-size: 1.1rem;
            color: var(--cinza-neutro);
            margin-bottom: 2rem;
        }
        
        .btn-primary {
            background: var(--borgonha-profundo);
            color: var(--branco);
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }
        
        .btn-primary:hover {
            background: #3A1234;
        }
        
        .footer {
            background: var(--borgonha-profundo);
            color: var(--branco);
            padding: 3rem 2rem 1.5rem;
            margin-top: 4rem;
        }
        
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        
        .footer-bottom {
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        @media (max-width: 768px) {
            .article-title {
                font-size: 2rem;
            }
            
            .article-content {
                padding: 2rem 1.5rem;
            }
            
            .article-meta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">Dra. Carine Petry</a>
            <a href="blog.html" class="btn-voltar">← Voltar ao Blog</a>
        </div>
    </header>

    <div id="articleContent">
        <!-- Será preenchido dinamicamente -->
    </div>

    <footer class="footer">
        <div class="footer-container">
            <p><strong>Dra. Carine Petry</strong> • Medicina do Sono • CRM-DF 15342</p>
            <div class="footer-bottom">
                <p>&copy; 2026 Dra. Carine Petry. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        function getPostIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }
        
        function loadPost(postId) {
            const postsJson = localStorage.getItem('blog_posts');
            if (!postsJson) return null;
            
            try {
                const posts = JSON.parse(postsJson);
                return posts.find(post => post.id === postId);
            } catch (e) {
                console.error('Erro ao carregar post:', e);
                return null;
            }
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
        }
        
        function calcularTempoLeitura(conteudo) {
            const palavras = conteudo.split(/\s+/).length;
            const minutos = Math.ceil(palavras / 200);
            return `${minutos} min de leitura`;
        }
        
        function formatContent(content) {
            return content
                .replace(/\n\n/g, '</p><p>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }
        
        function renderArticle(post) {
            const container = document.getElementById('articleContent');
            
            if (!post) {
                container.innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">📄</div>
                        <h1 class="error-title">Artigo não encontrado</h1>
                        <p class="error-text">O artigo que você está procurando não existe ou foi removido.</p>
                        <a href="blog.html" class="btn-primary">Voltar ao Blog</a>
                    </div>
                `;
                return;
            }
            
            // Atualizar título da página
            document.getElementById('pageTitle').textContent = `${post.titulo} | Dra. Carine Petry`;
            
            container.innerHTML = `
                <div class="article-header">
                    <div class="article-header-container">
                        <span class="article-category">${post.categoria || 'Medicina do Sono'}</span>
                        <h1 class="article-title">${post.titulo}</h1>
                        <div class="article-meta">
                            <span>📅 ${formatDate(post.data)}</span>
                            <span>⏱ ${calcularTempoLeitura(post.conteudo)}</span>
                            <span>✍️ Dra. Carine Petry</span>
                        </div>
                    </div>
                </div>
                
                ${post.imagem ? `<img src="${post.imagem}" alt="${post.titulo}" class="article-image">` : ''}
                
                <div class="article-container">
                    <article class="article-content">
                        <p>${formatContent(post.conteudo)}</p>
                    </article>
                </div>
            `;
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            const postId = getPostIdFromUrl();
            const post = loadPost(postId);
            renderArticle(post);
        });
    </script>
</body>
</html>
