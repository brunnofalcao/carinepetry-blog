<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts | Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; background: #4A1942; color: white; padding: 2rem 0; }
        .sidebar-header { padding: 0 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-title { font-size: 1.5rem; font-weight: 700; }
        .sidebar-nav { margin-top: 2rem; }
        .sidebar-nav a { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.2s; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-left: 250px; padding: 2rem; }
        .header { background: white; padding: 1.5rem 2rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.8rem; color: #333; }
        .btn-primary { background: #9D174D; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .posts-table { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 1rem; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #e9ecef; }
        td { padding: 1rem; border-bottom: 1px solid #e9ecef; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.85rem; font-weight: 600; }
        .badge-published { background: #d4edda; color: #155724; }
        .badge-draft { background: #fff3cd; color: #856404; }
        .post-actions { display: flex; gap: 0.5rem; }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.85rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-edit { background: #e9ecef; color: #495057; }
        .btn-delete { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><h1 class="sidebar-title">Admin</h1></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="posts.html" class="active">📝 Posts</a>
            <a href="editor.html">✍️ Novo Post</a>
            <a href="../index.html">🌐 Ver Site</a>
            <a href="index.html" onclick="sessionStorage.removeItem('admin_authenticated')">🚪 Sair</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="header">
            <h2 class="header-title">Posts</h2>
            <a href="editor.html" class="btn-primary">+ Novo Post</a>
        </div>
        <div class="posts-table">
            <table>
                <thead><tr><th>Título</th><th>Categoria</th><th>Status</th><th>Data</th><th>Ações</th></tr></thead>
                <tbody id="postsTableBody"></tbody>
            </table>
        </div>
    </main>
    <script>
        if (!sessionStorage.getItem('admin_authenticated')) window.location.href = 'index.html';
        
        function loadPosts() {
            const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
            const tbody = document.getElementById('postsTableBody');
            if (posts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 3rem; color: #999;">Nenhum post encontrado</td></tr>';
                return;
            }
            tbody.innerHTML = posts.map(post => `
                <tr>
                    <td><strong>${post.titulo}</strong></td>
                    <td>${post.categoria || 'Sem categoria'}</td>
                    <td><span class="badge badge-${post.status === 'publicado' ? 'published' : 'draft'}">${post.status === 'publicado' ? 'Publicado' : 'Rascunho'}</span></td>
                    <td>${new Date(post.data).toLocaleDateString('pt-BR')}</td>
                    <td class="post-actions">
                        <button class="btn-small btn-edit" onclick="editPost('${post.id}')">Editar</button>
                        <button class="btn-small btn-delete" onclick="deletePost('${post.id}')">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function editPost(id) {
            window.location.href = `editor.html?id=${id}`;
        }
        
        function deletePost(id) {
            if (confirm('Tem certeza que deseja excluir este post?')) {
                const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
                const filtered = posts.filter(p => p.id !== id);
                localStorage.setItem('blog_posts', JSON.stringify(filtered));
                loadPosts();
            }
        }
        
        loadPosts();
    </script>
</body>
</html>
