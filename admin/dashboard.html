<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #4A1942;
            color: white;
            padding: 2rem 0;
        }
        
        .sidebar-header {
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .sidebar-nav {
            margin-top: 2rem;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .main-content {
            margin-left: 250px;
            padding: 2rem;
        }
        
        .header {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .header-title {
            font-size: 1.8rem;
            color: #333;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4A1942;
        }
        
        .btn-primary {
            background: #9D174D;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary:hover {
            background: #7F1240;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1 class="sidebar-title">Admin</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="active">📊 Dashboard</a>
            <a href="posts.html">📝 Posts</a>
            <a href="editor.html">✍️ Novo Post</a>
            <a href="../index.html">🌐 Ver Site</a>
            <a href="index.html" onclick="sessionStorage.removeItem('admin_authenticated')">🚪 Sair</a>
        </nav>
    </aside>
    
    <main class="main-content">
        <div class="header">
            <h2 class="header-title">Dashboard</h2>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total de Posts</div>
                <div class="stat-value" id="totalPosts">0</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Posts Publicados</div>
                <div class="stat-value" id="publishedPosts">0</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Rascunhos</div>
                <div class="stat-value" id="draftPosts">0</div>
            </div>
        </div>
        
        <div style="text-align: center; padding: 3rem;">
            <a href="editor.html" class="btn-primary">+ Criar Novo Post</a>
        </div>
    </main>

    <script>
        // Verificar autenticação
        if (!sessionStorage.getItem('admin_authenticated')) {
            window.location.href = 'index.html';
        }
        
        // Carregar estatísticas
        function loadStats() {
            const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
            
            document.getElementById('totalPosts').textContent = posts.length;
            document.getElementById('publishedPosts').textContent = posts.filter(p => p.status === 'publicado').length;
            document.getElementById('draftPosts').textContent = posts.filter(p => p.status === 'rascunho').length;
        }
        
        loadStats();
    </script>
</body>
</html>
