<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor | Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; background: #4A1942; color: white; padding: 2rem 0; }
        .sidebar-header { padding: 0 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-title { font-size: 1.5rem; font-weight: 700; }
        .sidebar-nav { margin-top: 2rem; }
        .sidebar-nav a { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.2s; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-left: 250px; padding: 2rem; }
        .header { background: white; padding: 1.5rem 2rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-title { font-size: 1.8rem; color: #333; }
        .editor-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem 1rem; border: 2px solid #e9ecef; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1rem; }
        .form-group textarea { min-height: 300px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #9D174D; }
        .form-actions { display: flex; gap: 1rem; }
        .btn { padding: 1rem 2rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .btn-primary { background: #9D174D; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><h1 class="sidebar-title">Admin</h1></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="posts.html">📝 Posts</a>
            <a href="editor.html" class="active">✍️ Novo Post</a>
            <a href="../index.html">🌐 Ver Site</a>
            <a href="index.html" onclick="sessionStorage.removeItem('admin_authenticated')">🚪 Sair</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="header"><h2 class="header-title" id="pageTitle">Novo Post</h2></div>
        <div class="editor-container">
            <form id="postForm">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="titulo" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="categoria">
                        <option value="Medicina do Sono">Medicina do Sono</option>
                        <option value="SAM">SAM</option>
                        <option value="SED">SED</option>
                        <option value="Covid Longa">Covid Longa</option>
                        <option value="Diagnóstico">Diagnóstico</option>
                        <option value="Saúde">Saúde</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Resumo</label>
                    <textarea id="resumo" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Conteúdo</label>
                    <textarea id="conteudo" required></textarea>
                </div>
                <div class="form-group">
                    <label>URL da Imagem (opcional)</label>
                    <input type="url" id="imagem" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="rascunho">Rascunho</option>
                        <option value="publicado">Publicado</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar Post</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='posts.html'">Cancelar</button>
                </div>
            </form>
        </div>
    </main>
    <script>
        if (!sessionStorage.getItem('admin_authenticated')) window.location.href = 'index.html';
        
        let editingId = null;
        
        function getPostIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }
        
        function loadPost(id) {
            const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
            return posts.find(p => p.id === id);
        }
        
        function init() {
            const postId = getPostIdFromUrl();
            if (postId) {
                editingId = postId;
                const post = loadPost(postId);
                if (post) {
                    document.getElementById('pageTitle').textContent = 'Editar Post';
                    document.getElementById('titulo').value = post.titulo;
                    document.getElementById('categoria').value = post.categoria;
                    document.getElementById('resumo').value = post.resumo || '';
                    document.getElementById('conteudo').value = post.conteudo;
                    document.getElementById('imagem').value = post.imagem || '';
                    document.getElementById('status').value = post.status;
                }
            }
        }
        
        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
            
            const postData = {
                id: editingId || Date.now().toString(),
                titulo: document.getElementById('titulo').value,
                categoria: document.getElementById('categoria').value,
                resumo: document.getElementById('resumo').value,
                conteudo: document.getElementById('conteudo').value,
                imagem: document.getElementById('imagem').value,
                status: document.getElementById('status').value,
                data: editingId ? (posts.find(p => p.id === editingId)?.data || new Date().toISOString()) : new Date().toISOString()
            };
            
            if (editingId) {
                const index = posts.findIndex(p => p.id === editingId);
                posts[index] = postData;
            } else {
                posts.unshift(postData);
            }
            
            localStorage.setItem('blog_posts', JSON.stringify(posts));
            window.location.href = 'posts.html';
        });
        
        init();
    </script>
</body>
</html>
